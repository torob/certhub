url: https://certhub.example.com
sync:
  wait: true
  per_certificate_timeout: 5m
  poll_interval: 10s
  request_timeout: 30s
  retry_max_attempts: 5
  retry_initial_backoff: 1s
  retry_max_backoff: 8s
  force: false
  fail_fast: false
scheduler:
  interval: 6h
  jitter: 30s
  run_on_start: true
certificates:
  - domains:
      - example.com
    out_dir: /etc/certhub/material/example
