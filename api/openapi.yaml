          required: false
          schema:
            type: string
            format: uuid
        - name: certificate_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: application_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: correlation_id
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/CorrelationID'
      responses:
        '200':
          description: List of audit events.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventListResponse'
              examples:
                auditEvents:
                  $ref: '#/components/examples/AuditEventListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    UserBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: cth_uat_v1_<43-character-base64url-secret>
      description: Opaque User access token returned by login, refresh, or OIDC handoff.
    ApplicationBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: cth_app_v1_<43-character-base64url-secret>
      description: Opaque Application token used only for Application-authenticated APIs.

  parameters:
    XRequestID:
      name: X-Request-ID
      in: header
      required: false
      description: Optional caller-provided correlation ID. Invalid values are ignored and replaced by the server.
      schema:
        $ref: '#/components/schemas/CorrelationID'
    IfNoneMatch:
      name: If-None-Match
      in: header
      required: false
      description: Strong material ETag previously returned by a TLS material or archive endpoint.
      schema:
        $ref: '#/components/schemas/MaterialETag'
    AcceptGzip:
      name: Accept
      in: header
      required: false
      description: Set to `application/gzip` when calling a TLS archive endpoint. Requests that explicitly reject `application/gzip` receive `406 Not Acceptable`.
      schema:
        type: string
        example: application/gzip
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    CertificateID:
      name: certificate_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CertificateVersionID:
      name: certificate_version_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApplicationID:
      name: application_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserID:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TokenID:
      name: token_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ScopeID:
      name: scope_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IssuerID:
      name: issuer_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DNSProviderID:
      name: dns_provider_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ZoneID:
      name: zone_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AuditAction:
      name: action
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AuditAction'
    AuditResult:
      name: result
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AuditResult'
    CreatedAtFrom:
      name: created_at_from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    CreatedAtTo:
      name: created_at_to
      in: query
      required: false
      schema:
        type: string
        format: date-time

  headers:
    XRequestID:
      description: Effective correlation ID for the request.
      schema:
        $ref: '#/components/schemas/CorrelationID'
    RetryAfter:
      description: Seconds clients should wait before retrying the same request.
      schema:
        type: integer
        minimum: 1
    ETag:
      description: Strong material ETag for the exact returned certificate material.
      schema:
        $ref: '#/components/schemas/MaterialETag'
    CacheControlNoStore:
      description: Prevents storage of certificate material and auth-sensitive responses.
      schema:
        type: string
        enum: [no-store]
    PragmaNoCache:
      description: Legacy cache prevention header.
      schema:
        type: string
        enum: [no-cache]
    VaryAuthorization:
      description: Material responses vary by Authorization.
      schema:
        type: string
        enum: [Authorization]
    ContentDispositionArchive:
      description: Archive attachment filename derived from the first normalized SAN or Certificate ID.
      schema:
        type: string
        pattern: '^attachment; filename="[a-z0-9_-]+\.tar\.gz"$'

  responses:
    BadRequest:
      description: Invalid request.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidRequest:
              $ref: '#/components/examples/InvalidRequestError'
    Unauthorized:
      description: Authentication failed.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidToken:
              $ref: '#/components/examples/InvalidTokenError'
    Forbidden:
      description: Request is authenticated but not allowed.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              $ref: '#/components/examples/ForbiddenError'
    NotFound:
      description: Resource does not exist or is not visible.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              $ref: '#/components/examples/NotFoundError'
    NotAcceptable:
      description: Requested response media type is not supported.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notAcceptable:
              $ref: '#/components/examples/NotAcceptableError'
    Conflict:
      description: Request conflicts with current resource or certificate state.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            conflict:
              $ref: '#/components/examples/ConflictError'
    RateLimited:
      description: Request is rate limited.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            rateLimited:
              $ref: '#/components/examples/RateLimitedError'
    ServiceUnavailable:
      description: Backend dependency, issuer, DNS provider, or worker queue is unavailable.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            serviceUnavailable:
              $ref: '#/components/examples/ServiceUnavailableError'
            issuerUnavailable:
              $ref: '#/components/examples/IssuerUnavailableError'
            dnsZoneDiscoveryFailed:
              $ref: '#/components/examples/DNSZoneDiscoveryFailedError'
    TLSMaterialOK:
      description: JSON certificate material, including private key and material_etag.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        ETag:
          $ref: '#/components/headers/ETag'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TLSMaterialResponse'
          examples:
            material:
              $ref: '#/components/examples/TLSMaterialResponse'
    TLSArchiveOK:
      description: tar.gz archive containing cert.pem, chain.pem, fullchain.pem, privkey.pem, and metadata.json.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Content-Disposition:
          $ref: '#/components/headers/ContentDispositionArchive'
        ETag:
          $ref: '#/components/headers/ETag'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
      content:
        application/gzip:
          schema:
            type: string
            format: binary
    MaterialNoContent:
      description: If-None-Match matched latest valid material on a criteria-based POST endpoint.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        ETag:
          $ref: '#/components/headers/ETag'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'
    MaterialNotModified:
      description: If-None-Match matched latest valid material on an ID-based GET endpoint.
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        ETag:
          $ref: '#/components/headers/ETag'
        Cache-Control:
          $ref: '#/components/headers/CacheControlNoStore'
        Pragma:
          $ref: '#/components/headers/PragmaNoCache'
        Vary:
          $ref: '#/components/headers/VaryAuthorization'

  schemas:
    MachineName:
      type: string
      minLength: 1
      maxLength: 64
      pattern: '^[a-z](?:[a-z0-9_]{0,62}[a-z0-9])?$'
    Email:
      type: string
      format: email
      maxLength: 254
    HTTPSURL:
      type: string
      format: uri
      maxLength: 2048
      pattern: '^https://(?![^/?#]*@)(?!.*#)[^\s/?#]+(?:/[^\s#]*)?(?:\?[^\s#]*)?$'
    CorrelationID:
      type: string
      minLength: 1
      maxLength: 128
      pattern: '^[A-Za-z0-9._:-]+$'
      example: req_01HZY9T8YF3KZ9F2V5G9N0E2ZP
    UserAccessToken:
      type: string
      pattern: '^cth_uat_v1_[A-Za-z0-9_-]{43}$'
    UserRefreshToken:
      type: string
      pattern: '^cth_urt_v1_[A-Za-z0-9_-]{43}$'
    ApplicationTokenValue:
      type: string
      pattern: '^cth_app_v1_[A-Za-z0-9_-]{43}$'
    MaterialETag:
      type: string
      pattern: '^"cth-mat-v1\.[A-Za-z0-9_-]{43}"$'
      example: '"cth-mat-v1.JYjzT2o0Gd9c6SwJ5YYRWR6d9xWJ9G7dy2cW3rQpQ9E"'
    DNSName:
      type: string
      minLength: 1
      maxLength: 253
      pattern: '^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+$'
      description: "Normalized DNS name returned by the API: lowercase ASCII/punycode without a trailing root dot."
    InputDNSName:
      type: string
      minLength: 1
      maxLength: 253
      pattern: '^\S+\.?$'
      description: Raw DNS name accepted in requests before backend normalization. The backend lowercases, trims one trailing root dot, converts IDNs to punycode, then validates the normalized value as DNSName.
    CertificateIdentifier:
      type: string
      minLength: 1
      maxLength: 253
      pattern: '^(?:\*\.)?[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?(?:\.[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?)+$'
      example: '*.torob.dev'
      description: "Normalized certificate identifier returned by the API: DNSName or a single left-most wildcard DNSName."
    InputCertificateIdentifier:
      type: string
      minLength: 1
      maxLength: 253
      pattern: '^(?:\*\.)?\S+\.?$'
      example: '*.Torob.Dev.'
      description: Raw certificate identifier accepted in requests before backend normalization. The backend normalizes the non-wildcard DNS portion and then validates as CertificateIdentifier.
    IPOrCIDR:
      type: string
      minLength: 1
      maxLength: 64
      pattern: '^(?:(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})(?:\.(?:25[0-5]|2[0-4][0-9]|1?[0-9]{1,2})){3}(?:/(?:[0-9]|[1-2][0-9]|3[0-2]))?|[0-9A-Fa-f:.]+(?:/(?:[0-9]|[1-9][0-9]|1[01][0-9]|12[0-8]))?)$'
      example: 203.0.113.10/32
    SecretString:
      type: string
      minLength: 1
      maxLength: 4096
    HumanName:
      type: string
      minLength: 1
      maxLength: 255
    HumanDescription:
      type: string
      maxLength: 2048
      nullable: true
    KeyType:
      type: string
      enum: [rsa-2048, rsa-3072, rsa-4096, ecdsa-p256, ecdsa-p384]
      default: ecdsa-p256
    GlobalRole:
      type: string
      enum: [user, admin]
    UserStatus:
      type: string
      enum: [active, disabled]
    ApplicationStatus:
      type: string
      enum: [active, disabled]
    SystemApplicationKind:
      type: string
      description: Non-null for system Applications whose writable state is owned by backend process configuration.
      nullable: true
      enum: [certhub_server, null]
    ApplicationTokenStatus:
      type: string
      enum: [active, revoked]
    GrantRole:
      type: string
      enum: [viewer, certificate_reader, manager]
    ApplicationCurrentUserRole:
      type: string
      enum: [admin, viewer, certificate_reader, manager]
    DomainScopeKind:
      type: string
      enum: [exact, wildcard]
    OperationalStatus:
      type: string
      enum: [active, disabled]
    IssuerType:
      type: string
      enum: [acme]
    IssuerEnvironment:
      type: string
      enum: [production, staging]
    DNSProviderType:
      type: string
      enum: [cloudflare, arvancloud]
    DNSProviderZoneMode:
      type: string
      enum: [auto, manual]
    DNSZoneRefreshStatus:
      type: string
      enum: [idle, pending, running, succeeded, failed]
    JobStatus:
      type: string
      enum: [pending, running, succeeded, failed, canceled]
    CertificateStatus:
      type: string
      enum: [pending, validating_dns, issuing, ready, renewing, rotating_key, expired, revoked, failed, deleted]
    CertificateVersionStatus:
      type: string
      enum: [issuing, valid, failed, revoked]
    CertificateVersionReason:
      type: string
      enum: [initial_issue, renewal, key_rotation, reissue]
    RevocationReason:
      type: string
      enum: [key_compromise, superseded, cessation_of_operation, unspecified]
      default: unspecified
    ACMERevocationStatus:
      type: string
      enum: [pending, succeeded, failed, not_required]
    AuditIdentityType:
      type: string
      enum: [user, application, system]
    AuditResult:
      type: string
      enum: [success, failure]
    AuditAction:
      type: string
      enum:
        - bootstrap_admin_created
        - user_created
        - user_invite_created
        - user_invite_signup_started
        - user_invite_consumed
        - user_updated
        - user_login_succeeded
        - user_login_failed
        - user_session_created
        - user_session_refreshed
        - user_session_revoked
        - password_2fa_setup_started
        - password_2fa_enabled
        - password_2fa_disabled
        - application_created
        - application_updated
        - application_token_created
        - application_token_revoked
        - domain_scope_created
        - domain_scope_deleted
        - application_access_granted
        - application_access_revoked
        - issuer_created
        - issuer_updated
        - issuer_disabled
        - acme_account_created
        - dns_provider_created
        - dns_provider_updated
        - dns_provider_credentials_replaced
        - dns_provider_zone_added
        - dns_provider_zone_removed
        - dns_provider_zone_refresh_started
        - dns_provider_zone_refreshed
        - dns_zone_discovery_failed
        - certificate_created
        - certificate_issuance_started
        - certificate_issuance_succeeded
        - certificate_issuance_failed
        - certificate_renewal_started
        - certificate_renewal_succeeded
        - certificate_renewal_failed
        - certificate_key_rotation_started
        - certificate_key_rotation_succeeded
        - certificate_key_rotation_failed
        - certificate_revoked
        - certificate_revocation_retried
        - certificate_revocation_failed
        - certificate_deleted
        - private_key_read
        - server_self_certificate_synced
    ErrorCode:
      type: string
      enum:
        - invalid_domain
        - invalid_request
        - invalid_token
        - invalid_credentials
        - invalid_refresh_token
        - session_expired
        - invalid_2fa_code
        - oidc_auth_failed
        - application_token_required
        - user_token_required
        - refresh_token_not_allowed
        - application_source_ip_denied
        - application_access_denied
        - private_key_access_denied
        - domain_not_authorized
        - password_auth_disabled
        - password_2fa_required
        - user_disabled
        - user_not_provisioned
        - invalid_invite
        - certificate_not_found
        - certificate_not_ready
        - certificate_expired
        - certificate_issuance_failed
        - certificate_revoked
        - certificate_no_active_version
        - not_acceptable
        - renewal_overlap_exists
        - renewal_not_due
        - system_managed_resource
        - conflict
        - issuer_not_configured
        - service_unavailable
        - issuer_unavailable
        - dns_provider_not_found
        - dns_provider_zone_conflict
        - dns_provider_unavailable
        - dns_zone_discovery_failed
        - dns_validation_failed
        - rate_limited

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorEnvelope'
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [code, message, retryable]
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          type: string
          minLength: 1
          maxLength: 2048
        retryable:
          type: boolean
        retry_after_seconds:
          type: integer
          minimum: 1
          nullable: true
        details:
          $ref: '#/components/schemas/ErrorDetails'
      example:
        code: domain_not_authorized
        message: Application is not authorized for api.torob.dev
        retryable: false
        retry_after_seconds: null
        details:
          unauthorized_domains: [api.torob.dev]
    ErrorDetails:
      description: Non-secret structured details. Shape depends on error.code.
      oneOf:
        - $ref: '#/components/schemas/EmptyErrorDetails'
        - $ref: '#/components/schemas/ValidationErrorDetails'
        - $ref: '#/components/schemas/DomainNotAuthorizedDetails'
        - $ref: '#/components/schemas/CertificateStateErrorDetails'
        - $ref: '#/components/schemas/CertificateIssuanceFailedDetails'
        - $ref: '#/components/schemas/CertificateRevokedDetails'
        - $ref: '#/components/schemas/RenewalOverlapDetails'
        - $ref: '#/components/schemas/DNSProviderZoneConflictDetails'
        - $ref: '#/components/schemas/ReadinessErrorDetails'
    EmptyErrorDetails:
      type: object
      additionalProperties: false
    ValidationErrorDetails:
      type: object
      additionalProperties: false
      required: [fields]
      properties:
        fields:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string
    DomainNotAuthorizedDetails:
      type: object
      additionalProperties: false
      required: [unauthorized_domains]
      properties:
        unauthorized_domains:
          type: array
          items:
            $ref: '#/components/schemas/CertificateIdentifier'
        application_id:
          type: string
          format: uuid
    CertificateStateErrorDetails:
      type: object
      additionalProperties: false
      required: [certificate_id, status]
      properties:
        certificate_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, validating_dns, issuing, renewing, rotating_key, expired]
        not_after:
          type: string
          format: date-time
          nullable: true
    CertificateIssuanceFailedDetails:
      type: object
      additionalProperties: false
      required: [certificate_id, status, failure_code, failure_message]
      properties:
        certificate_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [failed]
        failure_code:
          type: string
          nullable: true
        failure_message:
          type: string
          maxLength: 2048
          nullable: true
    CertificateRevokedDetails:
      type: object
      additionalProperties: false
      required: [certificate_id, status, revocation_reason, revoked_at]
      properties:
        certificate_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [revoked]
        revocation_reason:
          $ref: '#/components/schemas/RevocationReason'
        revoked_at:
          type: string
          format: date-time
    RenewalOverlapDetails:
      type: object
      additionalProperties: false
      required: [certificate_id, valid_versions]
      properties:
        certificate_id:
          type: string
          format: uuid
        valid_versions:
          type: array
          items:
            $ref: '#/components/schemas/CertificateVersionMetadata'
    DNSProviderZoneConflictDetails:
      type: object
      additionalProperties: false
      required: [zone_name, dns_provider_id, conflict_dns_provider_id]
      properties:
        zone_name:
          $ref: '#/components/schemas/DNSName'
        dns_provider_id:
          type: string
          format: uuid
        conflict_dns_provider_id:
          type: string
          format: uuid
    ReadinessErrorDetails:
      type: object
      additionalProperties: false
      required: [checks]
      properties:
        checks:
          type: array
          items:
            $ref: '#/components/schemas/ReadinessCheck'

    PageMeta:
      type: object
      additionalProperties: false
      required: [limit, offset, total]
      properties:
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0

    HealthResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
