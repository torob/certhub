openapi: 3.0.3
info:
  title: Certhub API
  version: 1.0.0
  description: |
    Public HTTP API contract for Certhub v1, derived from specs/backend-spec.md.
    Certhub is the source of truth for Application-owned public TLS certificates.
    User-authenticated management APIs use User access tokens. Runtime sync APIs
    under /v1/sync use Application tokens only.
servers:
  - url: /
    description: Same-origin Certhub server
tags:
  - name: Health
    description: Liveness, readiness, and metrics endpoints.
  - name: Authentication
    description: User login, OIDC handoff, session refresh, logout, and password 2FA.
  - name: Sync
    description: Application-token certificate sync endpoints for CLI, agents, and operators.
  - name: Certificates
    description: Certificate management, lifecycle actions, material download, and archive download.
  - name: Users
    description: User administration and lookup workflows.
  - name: Applications
    description: Application identities, tokens, domain scopes, and User grants.
  - name: Issuers
    description: ACME issuer configuration and lifecycle.
  - name: DNS Providers
    description: DNS provider configuration, zone management, and zone discovery.
  - name: Audit
    description: Audit-event listing and certificate event history.

paths:
  /healthz:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Health]
      operationId: getHealthz
      summary: Return liveness for the backend process.
      security: []
      responses:
        '200':
          description: Process is alive.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  $ref: '#/components/examples/HealthResponse'

  /readyz:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Health]
      operationId: getReadyz
      summary: Return readiness for serving API traffic.
      security: []
      responses:
        '200':
          description: Backend is ready.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
              examples:
                ready:
                  $ref: '#/components/examples/ReadinessResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /metrics:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Health]
      operationId: getMetrics
      summary: Expose Prometheus metrics for internal scraping.
      security: []
      responses:
        '200':
          description: Prometheus text exposition.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            text/plain; version=0.0.4:
              schema:
                type: string

  /v1/auth/login:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    post:
      tags: [Authentication]
      operationId: loginUser
      summary: Exchange User email/password for a User access token and refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              passwordWithTotp:
                $ref: '#/components/examples/UserLoginRequest'
      responses:
        '200':
          description: Login succeeded.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                login:
                  $ref: '#/components/examples/UserLoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/auth/password-2fa/setup:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    post:
      tags: [Authentication]
      operationId: setupPassword2FA
      summary: Start TOTP setup for the current User.
      security:
        - UserBearerAuth: []
      responses:
        '200':
          description: Pending TOTP setup created.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Password2FAProvisioning'
              examples:
                provisioning:
                  $ref: '#/components/examples/Password2FAProvisioning'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/auth/password-2fa/confirm:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    post:
      tags: [Authentication]
      operationId: confirmPassword2FA
      summary: Confirm TOTP setup for the current User.
      security:
        - UserBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Password2FAConfirmRequest'
            examples:
              confirm:
                $ref: '#/components/examples/Password2FAConfirmRequest'
      responses:
        '200':
          description: Password 2FA enabled.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Password2FAStatusResponse'
              examples:
                enabled:
                  $ref: '#/components/examples/Password2FAStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/auth/password-2fa:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    delete:
      tags: [Authentication]
      operationId: disablePassword2FA
      summary: Disable TOTP for the current User.
      security:
        - UserBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Password2FADisableRequest'
            examples:
              disable:
                $ref: '#/components/examples/Password2FADisableRequest'
      responses:
        '204':
          description: Password 2FA disabled.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/auth/oidc/login:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Authentication]
      operationId: startOIDCLogin
      summary: Start OIDC browser login.
      security: []
      parameters:
        - name: return_url
          in: query
          required: false
          schema:
            type: string
            format: uri
            maxLength: 2048
      responses:
        '302':
          description: Redirect to OIDC provider authorization URL.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Location:
              description: OIDC provider authorization URL.
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/auth/oidc/callback:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Authentication]
      operationId: completeOIDCCallback
      summary: Complete provider-facing OIDC callback and redirect to frontend with a handoff ID.
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 4096
        - name: state
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 4096
      responses:
        '302':
          description: Callback succeeded; redirect target is the frontend callback route with a handoff ID.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Location:
              description: Validated frontend return URL containing the one-time handoff ID.
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/auth/oidc/handoff:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    post:
      tags: [Authentication]
      operationId: exchangeOIDCHandoff
      summary: Exchange a short-lived OIDC handoff ID for User session tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OIDCHandoffRequest'
            examples:
              handoff:
                $ref: '#/components/examples/OIDCHandoffRequest'
      responses:
        '200':
          description: OIDC login succeeded.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                login:
                  $ref: '#/components/examples/UserLoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/auth/refresh:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    post:
      tags: [Authentication]
      operationId: refreshUserSession
      summary: Rotate a refresh token and return new User session tokens.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples:
              refresh:
                $ref: '#/components/examples/RefreshRequest'
      responses:
        '200':
          description: Refresh succeeded.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
              examples:
                tokens:
                  $ref: '#/components/examples/AuthTokens'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/logout:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    post:
      tags: [Authentication]
      operationId: logoutUser
      summary: Revoke the current User login session.
      security:
        - UserBearerAuth: []
      responses:
        '204':
          description: Session revoked.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/me:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Authentication]
      operationId: getAuthenticatedIdentity
      summary: Return the authenticated User or Application identity.
      security:
        - UserBearerAuth: []
        - ApplicationBearerAuth: []
      responses:
        '200':
          description: Authenticated identity metadata.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
              examples:
                user:
                  $ref: '#/components/examples/AuthMeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/sync/certificates:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    post:
      tags: [Sync]
      operationId: ensureSyncCertificate
      summary: Ensure a Certificate exists for criteria and start issuance when needed.
      security:
        - ApplicationBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificateCriteria'
            examples:
              wildcard:
                $ref: '#/components/examples/CertificateCriteria'
      responses:
        '200':
          description: Existing Certificate returned as metadata.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateResponse'
              examples:
                certificate:
                  $ref: '#/components/examples/CertificateResponse'
        '202':
          description: Certificate exists and issuance, renewal, reissue, or key rotation is pending or in progress.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateResponse'
              examples:
                pending:
                  $ref: '#/components/examples/CertificatePendingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/sync/certificates/tls-material:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    post:
      tags: [Sync]
      operationId: getSyncTLSMaterial
      summary: Return current TLS material as JSON for an exact criteria match using an Application token.
      security:
        - ApplicationBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificateCriteria'
            examples:
              wildcard:
                $ref: '#/components/examples/CertificateCriteria'
      responses:
        '200':
          $ref: '#/components/responses/TLSMaterialOK'
        '204':
          $ref: '#/components/responses/MaterialNoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/sync/certificates/tls-archive:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    post:
      tags: [Sync]
      operationId: getSyncTLSArchive
      summary: Return current TLS material as a tar.gz archive for an exact criteria match using an Application token.
      security:
        - ApplicationBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
        - $ref: '#/components/parameters/AcceptGzip'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificateCriteria'
            examples:
              wildcard:
                $ref: '#/components/examples/CertificateCriteria'
      responses:
        '200':
          $ref: '#/components/responses/TLSArchiveOK'
        '204':
          $ref: '#/components/responses/MaterialNoContent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/certificates:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
    get:
      tags: [Certificates]
      operationId: listCertificates
      summary: List certificate metadata with optional filters.
      security:
        - UserBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: domain
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/InputCertificateIdentifier'
        - name: application
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 64
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/CertificateStatus'
        - name: expires_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: issuer
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/MachineName'
        - name: key_type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/KeyType'
      responses:
        '200':
          description: List of visible certificate metadata.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateListResponse'
              examples:
                certificates:
                  $ref: '#/components/examples/CertificateListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/certificates/{certificate_id}:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/CertificateID'
    get:
      tags: [Certificates]
      operationId: getCertificate
      summary: Return certificate metadata by ID for human/web-console workflows.
      security:
        - UserBearerAuth: []
      responses:
        '200':
          description: Certificate metadata.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateResponse'
              examples:
                certificate:
                  $ref: '#/components/examples/CertificateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/certificates/{certificate_id}/versions:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/CertificateID'
    get:
      tags: [Certificates]
      operationId: listCertificateVersions
      summary: List CertificateVersion metadata for one certificate.
      security:
        - UserBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: CertificateVersion metadata sorted newest first.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateVersionListResponse'
              examples:
                versions:
                  $ref: '#/components/examples/CertificateVersionListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/certificates/{certificate_id}/versions/{certificate_version_id}/tls-archive:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/CertificateID'
      - $ref: '#/components/parameters/CertificateVersionID'
    get:
      tags: [Certificates]
      operationId: getCertificateVersionTLSArchive
      summary: Return downloadable TLS material for one CertificateVersion as a tar.gz archive.
      security:
        - UserBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
        - $ref: '#/components/parameters/AcceptGzip'
      responses:
        '200':
          $ref: '#/components/responses/TLSArchiveOK'
        '304':
          $ref: '#/components/responses/MaterialNotModified'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/certificates/{certificate_id}/versions/{certificate_version_id}/revoke:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/CertificateID'
      - $ref: '#/components/parameters/CertificateVersionID'
    post:
      tags: [Certificates]
      operationId: revokeCertificateVersion
      summary: Revoke one specific CertificateVersion.
      security:
        - UserBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificateRevokeRequest'
      responses:
        '202':
          description: Version revocation recorded and remote ACME revocation queued when applicable.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Cache-Control:
              $ref: '#/components/headers/CacheControlNoStore'
            Pragma:
              $ref: '#/components/headers/PragmaNoCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CertificateVersionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/certificates/{certificate_id}/tls-archive:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/CertificateID'
    get:
      tags: [Certificates]
      operationId: getCertificateTLSArchive
      summary: Return current TLS material as a tar.gz archive for a certificate selected by ID.
      security:
        - UserBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
        - $ref: '#/components/parameters/AcceptGzip'
      responses:
        '200':
          $ref: '#/components/responses/TLSArchiveOK'
        '304':
          $ref: '#/components/responses/MaterialNotModified'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          $ref: '#/components/responses/NotAcceptable'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/certificates/{certificate_id}/renew:
    parameters:
      - $ref: '#/components/parameters/XRequestID'
      - $ref: '#/components/parameters/CertificateID'
    post:
      tags: [Certificates]
      operationId: renewCertificate
      summary: Start renewal for a certificate selected by ID.
      security:
        - UserBearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
