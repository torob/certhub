database:
  url_env: "CERTHUB_DATABASE_URL"
encryption:
  key_env: "CERTHUB_ENCRYPTION_KEY"
http:
  bind_addr: ":8080"
  require_https: false
  trusted_proxy_cidrs: []
server:
  public_hostname: ""
self_certificate:
  sync_enabled: false
dns:
  propagation_timeout_seconds: 120
  propagation_poll_seconds: 5
  propagation_resolvers:
    cloudflare:
      type: system
    arvancloud:
      type: system
auth:
  password:
    enabled: true
    2fa_required: true
  user_access_token_ttl_seconds: 300
  user_session_ttl_seconds: 28800
  password_reset_ttl_seconds: 3600
  oidc:
    enabled: false
workers:
  concurrency: 2
