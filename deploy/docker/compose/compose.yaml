name: certhub

services:
  postgres:
    image: docker.io/library/postgres:16.3
    environment:
      POSTGRES_DB: certhub
      POSTGRES_USER: certhub
      POSTGRES_PASSWORD: ${CERTHUB_POSTGRES_PASSWORD:?set CERTHUB_POSTGRES_PASSWORD in your env file}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certhub -d certhub"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  server:
    image: ghcr.io/torob/certhub-server:${CERTHUB_IMAGE_TAG:-0.1.0}
    command: ["run", "--migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CERTHUB_DATABASE_URL: postgres://certhub:${CERTHUB_POSTGRES_PASSWORD:?set CERTHUB_POSTGRES_PASSWORD in your env file}@postgres:5432/certhub?sslmode=disable
      CERTHUB_ENCRYPTION_KEY: ${CERTHUB_ENCRYPTION_KEY:?set CERTHUB_ENCRYPTION_KEY in your env file}
    ports:
      - "${CERTHUB_SERVER_PORT:-8080}:8080"
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./server.yaml:/etc/certhub/server.yaml:ro
      - server-data:/var/lib/certhub
    restart: unless-stopped

volumes:
  postgres-data:
  server-data:
