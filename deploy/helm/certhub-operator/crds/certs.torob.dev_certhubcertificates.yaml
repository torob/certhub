apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: certhubcertificates.certs.torob.dev
spec:
  group: certs.torob.dev
  scope: Namespaced
  names:
    plural: certhubcertificates
    singular: certhubcertificate
    kind: CerthubCertificate
    shortNames:
      - cthcert
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Secret
          type: string
          jsonPath: .spec.secretName
        - name: NotAfter
          type: date
          jsonPath: .status.notAfter
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - domains
                - secretName
              properties:
                domains:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    minLength: 1
                    maxLength: 253
                    pattern: '^(\*\.)?[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?(?:\.[A-Za-z0-9](?:[A-Za-z0-9-]{0,61}[A-Za-z0-9])?)+$'
                secretName:
                  type: string
                  pattern: '^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$'
                keyType:
                  type: string
                  enum:
                    - rsa-2048
                    - rsa-3072
                    - rsa-4096
                    - ecdsa-p256
                    - ecdsa-p384
                issuer:
                  type: string
                  pattern: '^[a-z](?:[a-z0-9_]{0,62}[a-z0-9])?$'
                secretDeletionPolicy:
                  type: string
                  enum:
                    - Retain
                    - Delete
                  default: Retain
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - ValidatingDNS
                    - Issuing
                    - Ready
                    - Failed
                certificateId:
                  type: string
                observedDomains:
                  type: array
                  items:
                    type: string
                notBefore:
                  type: string
                  format: date-time
                notAfter:
                  type: string
                  format: date-time
                renewalTime:
                  type: string
                  format: date-time
                message:
                  type: string
                  maxLength: 240
                observedRetryId:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                        maxLength: 240
                      lastTransitionTime:
                        type: string
                        format: date-time
