nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/torob/certhub-operator
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

clusterScoped: false

# Exact namespaces to watch in namespaced mode. An empty list uses the Helm
# release namespace. Leave empty when clusterScoped=true.
watchNamespaces: []

rbac:
  create: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

certhub:
  url: ""
  # The token Secret must exist in the Helm release namespace. Its value is
  # injected into the operator as CERTHUB_TOKEN without operator Secret RBAC.
  tokenSecretName: certhub-token
  tokenSecretKey: token
  resyncInterval: 6h
  reconcileBackoff: 1m
  httpTimeout: 30s
  httpRetryMaxAttempts: 5
  httpRetryInitialBackoff: 1s
  httpRetryMaxBackoff: 8s

metrics:
  service:
    enabled: true
    port: 8080
    annotations: {}
    labels: {}
  serviceMonitor:
    enabled: false
    additionalLabels: {}
    interval: 30s
    scrapeTimeout: 10s

networkPolicy:
  # Enable a network policy selecting only this release's operator pod.
  enabled: false

  # Supported providers are "kubernetes" and "cilium". Only the selected
  # provider's resource is rendered.
  provider: cilium

  kubernetes:
    # Native networking.k8s.io/v1 NetworkPolicy ingress rules.
    #
    # null/omitted: omit spec.ingress and do not isolate ingress.
    # []: render spec.ingress: [] and isolate ingress with no allowed traffic.
    # - {}: allow all ingress under Kubernetes NetworkPolicy semantics.
    ingress:

    # Native networking.k8s.io/v1 NetworkPolicy egress rules.
    #
    # null/omitted: omit spec.egress and do not isolate egress.
    # []: render spec.egress: [] and isolate egress with no allowed traffic.
    # - {}: allow all egress under Kubernetes NetworkPolicy semantics.
    egress:

  cilium:
    # Native Cilium ingress rules. Rules may use fromEndpoints, fromCIDR,
    # fromCIDRSet, fromEntities, and toPorts.
    #
    # null/omitted: omit spec.ingress.
    # []: render an empty spec.ingress list.
    # - {}: render one empty native Cilium ingress rule.
    ingress:

    # Native Cilium egress rules. Rules may use toEndpoints, toCIDR,
    # toCIDRSet, toEntities, toServices, toFQDNs, and toPorts.
    #
    # null/omitted: omit spec.egress.
    # []: render an empty spec.egress list.
    # - {}: render one empty native Cilium egress rule.
    egress:

resources: {}

podAnnotations: {}
podLabels: {}
priorityClassName: ""
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
terminationGracePeriodSeconds: 30

probes:
  liveness:
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
