nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: ghcr.io/torob/certhub-operator
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

clusterScoped: false
watchNamespace: ""
managedSecretNames: []

rbac:
  create: true
  createTargetSecrets: true

serviceAccount:
  create: true
  name: ""
  annotations: {}

certhub:
  url: ""
  tokenSecretName: certhub-token
  tokenSecretKey: token
  tokenSecretNamespace: ""
  resyncInterval: 6h
  reconcileBackoff: 1m
  httpTimeout: 30s
  httpRetryMaxAttempts: 5
  httpRetryInitialBackoff: 1s
  httpRetryMaxBackoff: 8s

metrics:
  service:
    enabled: true
    port: 8080
    annotations: {}
    labels: {}
  serviceMonitor:
    enabled: false
    additionalLabels: {}
    interval: 30s
    scrapeTimeout: 10s

resources: {}

podAnnotations: {}
podLabels: {}
priorityClassName: ""
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
terminationGracePeriodSeconds: 30

probes:
  liveness:
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
