{{- if .Values.rbac.create }}
{{- if .Values.clusterScoped }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "certhub-operator.clusterFullname" . }}
  labels:
    {{- include "certhub-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["certs.torob.dev"]
    resources: ["certhubcertificates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["certs.torob.dev"]
    resources: ["certhubcertificates/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["certs.torob.dev"]
    resources: ["certhubcertificates/finalizers"]
    verbs: ["update", "patch"]
  {{- if .Values.rbac.createTargetSecrets }}
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  {{- end }}
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- toYaml .Values.managedSecretNames | nindent 6 }}
    verbs: ["get", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "certhub-operator.clusterFullname" . }}
  labels:
    {{- include "certhub-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "certhub-operator.clusterFullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "certhub-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- $tokenNamespace := default .Release.Namespace .Values.certhub.tokenSecretNamespace }}
{{- $tokenRBACName := include "certhub-operator.namespacedRBACName" (list . $tokenNamespace (include "certhub-operator.tokenRBACName" .)) }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $tokenRBACName }}
  namespace: {{ $tokenNamespace }}
  labels:
    {{- include "certhub-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.certhub.tokenSecretName | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $tokenRBACName }}
  namespace: {{ $tokenNamespace }}
  labels:
    {{- include "certhub-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $tokenRBACName }}
subjects:
  - kind: ServiceAccount
    name: {{ include "certhub-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
{{- $watchNamespace := default .Release.Namespace .Values.watchNamespace }}
{{- $tokenNamespace := default $watchNamespace .Values.certhub.tokenSecretNamespace }}
{{- $watchRBACName := include "certhub-operator.namespacedRBACName" (list . $watchNamespace (include "certhub-operator.fullname" .)) }}
{{- $tokenRBACName := include "certhub-operator.namespacedRBACName" (list . $tokenNamespace (include "certhub-operator.tokenRBACName" .)) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $watchRBACName }}
  namespace: {{ $watchNamespace }}
  labels:
    {{- include "certhub-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["certs.torob.dev"]
    resources: ["certhubcertificates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["certs.torob.dev"]
    resources: ["certhubcertificates/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["certs.torob.dev"]
    resources: ["certhubcertificates/finalizers"]
    verbs: ["update", "patch"]
  {{- if .Values.rbac.createTargetSecrets }}
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  {{- end }}
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- toYaml .Values.managedSecretNames | nindent 6 }}
    verbs: ["get", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $watchRBACName }}
  namespace: {{ $watchNamespace }}
  labels:
    {{- include "certhub-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $watchRBACName }}
subjects:
  - kind: ServiceAccount
    name: {{ include "certhub-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $tokenRBACName }}
  namespace: {{ $tokenNamespace }}
  labels:
    {{- include "certhub-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: [{{ .Values.certhub.tokenSecretName | quote }}]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $tokenRBACName }}
  namespace: {{ $tokenNamespace }}
  labels:
    {{- include "certhub-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $tokenRBACName }}
subjects:
  - kind: ServiceAccount
    name: {{ include "certhub-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
