{{- if .Values.rbac.create }}
{{- if .Values.clusterScoped }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "certhub-operator.clusterFullname" . }}
  labels:
    {{- include "certhub-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["certs.torob.dev"]
    resources: ["certhubcertificates"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["certs.torob.dev"]
    resources: ["certhubcertificates/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "certhub-operator.clusterFullname" . }}
  labels:
    {{- include "certhub-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "certhub-operator.clusterFullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "certhub-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else }}
{{- $watchNamespaces := .Values.watchNamespaces }}
{{- if eq (len $watchNamespaces) 0 }}
{{- $watchNamespaces = list .Release.Namespace }}
{{- end }}
{{- range $index, $watchNamespace := $watchNamespaces }}
{{- if gt $index 0 }}
---
{{- end }}
{{- $watchRBACName := include "certhub-operator.namespacedRBACName" (list $ $watchNamespace (include "certhub-operator.fullname" $)) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $watchRBACName }}
  namespace: {{ $watchNamespace }}
  labels:
    {{- include "certhub-operator.labels" $ | nindent 4 }}
rules:
  - apiGroups: ["certs.torob.dev"]
    resources: ["certhubcertificates"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["certs.torob.dev"]
    resources: ["certhubcertificates/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $watchRBACName }}
  namespace: {{ $watchNamespace }}
  labels:
    {{- include "certhub-operator.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $watchRBACName }}
subjects:
  - kind: ServiceAccount
    name: {{ include "certhub-operator.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
