apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-certhub-operator
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: certhub-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: certhub-operator
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: certhub-operator
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-certhub-operator
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["run"]
          env:
            - name: CERTHUB_URL
              value: {{ .Values.certhub.url | quote }}
            - name: CERTHUB_TOKEN_SECRET_NAME
              value: {{ .Values.certhub.tokenSecretName | quote }}
            - name: CERTHUB_TOKEN_SECRET_KEY
              value: {{ .Values.certhub.tokenSecretKey | quote }}
            - name: CERTHUB_TOKEN_SECRET_NAMESPACE
              value: {{ default (ternary .Release.Namespace (default .Release.Namespace .Values.watchNamespace) .Values.clusterScoped) .Values.certhub.tokenSecretNamespace | quote }}
            - name: WATCH_NAMESPACE
              value: {{ ternary .Values.watchNamespace (default .Release.Namespace .Values.watchNamespace) .Values.clusterScoped | quote }}
            - name: CERTHUB_METRICS_BIND_ADDR
              value: {{ printf ":%v" .Values.metrics.service.port | quote }}
            - name: CERTHUB_RESYNC_INTERVAL
              value: {{ .Values.certhub.resyncInterval | quote }}
            - name: CERTHUB_RECONCILE_BACKOFF
              value: {{ .Values.certhub.reconcileBackoff | quote }}
            - name: CERTHUB_HTTP_TIMEOUT
              value: {{ default "30s" .Values.certhub.httpTimeout | quote }}
            - name: CERTHUB_HTTP_RETRY_MAX_ATTEMPTS
              value: {{ default 5 .Values.certhub.httpRetryMaxAttempts | quote }}
            - name: CERTHUB_HTTP_RETRY_INITIAL_BACKOFF
              value: {{ default "1s" .Values.certhub.httpRetryInitialBackoff | quote }}
            - name: CERTHUB_HTTP_RETRY_MAX_BACKOFF
              value: {{ default "8s" .Values.certhub.httpRetryMaxBackoff | quote }}
            - name: CERTHUB_ALLOWED_SECRET_NAMES
              value: {{ join "," .Values.managedSecretNames | quote }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.service.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
