{{- $watchNamespaces := .Values.watchNamespaces -}}
{{- if and (not .Values.clusterScoped) (eq (len $watchNamespaces) 0) -}}
{{- $watchNamespaces = list .Release.Namespace -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "certhub-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "certhub-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "certhub-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- include "certhub-operator.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "certhub-operator.serviceAccountName" . }}
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: operator
          image: {{ include "certhub-operator.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["run"]
          env:
            - name: CERTHUB_URL
              value: {{ .Values.certhub.url | quote }}
            - name: CERTHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.certhub.tokenSecretName | quote }}
                  key: {{ .Values.certhub.tokenSecretKey | quote }}
            - name: WATCH_NAMESPACES
              value: {{ join "," $watchNamespaces | quote }}
            - name: CERTHUB_METRICS_BIND_ADDR
              value: {{ printf ":%v" .Values.metrics.service.port | quote }}
            - name: CERTHUB_RESYNC_INTERVAL
              value: {{ .Values.certhub.resyncInterval | quote }}
            - name: CERTHUB_RECONCILE_BACKOFF
              value: {{ .Values.certhub.reconcileBackoff | quote }}
            - name: CERTHUB_HTTP_TIMEOUT
              value: {{ default "30s" .Values.certhub.httpTimeout | quote }}
            - name: CERTHUB_HTTP_RETRY_MAX_ATTEMPTS
              value: {{ default 5 .Values.certhub.httpRetryMaxAttempts | quote }}
            - name: CERTHUB_HTTP_RETRY_INITIAL_BACKOFF
              value: {{ default "1s" .Values.certhub.httpRetryInitialBackoff | quote }}
            - name: CERTHUB_HTTP_RETRY_MAX_BACKOFF
              value: {{ default "8s" .Values.certhub.httpRetryMaxBackoff | quote }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.service.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
