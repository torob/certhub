apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-certhub-server
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: certhub-server
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      app.kubernetes.io/name: certhub-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: certhub-server
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}-certhub-server
      automountServiceAccountToken: false
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["run", "--config", {{ .Values.configPath | quote }}]
          env:
            - name: CERTHUB_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.databaseUrlSecretName | quote }}
                  key: {{ .Values.env.databaseUrlSecretKey | quote }}
            - name: CERTHUB_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.encryptionKeySecretName | quote }}
                  key: {{ .Values.env.encryptionKeySecretKey | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          volumeMounts:
            - name: config
              mountPath: {{ .Values.configPath | quote }}
              subPath: config.yaml
              readOnly: true
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-certhub-server-config
            defaultMode: 0440
