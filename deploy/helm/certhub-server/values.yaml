replicaCount: 1

image:
  repository: ghcr.io/torob/certhub-server
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

configPath: /etc/certhub/config.yaml

env:
  databaseUrlSecretName: certhub-database
  databaseUrlSecretKey: url
  encryptionKeySecretName: certhub-encryption
  encryptionKeySecretKey: key

config:
  yaml: |
    database:
      url_env: "CERTHUB_DATABASE_URL"
    encryption:
      key_env: "CERTHUB_ENCRYPTION_KEY"
    http:
      bind_addr: ":8080"
      require_https: false
      trusted_proxy_cidrs: []
    server:
      public_hostname: ""
    tls:
      cert_file: ""
      key_file: ""
    self_certificate:
      sync_enabled: false
    auth:
      password:
        enabled: true
        2fa_required: false
      oidc:
        enabled: false
    workers:
      concurrency: 2

resources: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
